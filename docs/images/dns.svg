<svg viewBox="0 0 520 270" width="520" height="270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DNS 添加 A 记录示意">
<title>DNS 添加 A 记录</title>
<rect x="0" y="0" width="520" height="270" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="22" y="38" fill="#1f2937" font-family="sans-serif" font-size="17" font-weight="500">添加记录</text>
<rect x="468" y="18" width="28" height="28" rx="8" fill="#f3f4f6"/><text x="482" y="38" fill="#6b7280" font-family="sans-serif" font-size="15" text-anchor="middle">×</text>
<text x="22" y="70" fill="#374151" font-family="sans-serif" font-size="12.5">dot 指向 203.0.113.10。</text>
<text x="22" y="96" fill="#6b7280" font-family="sans-serif" font-size="11">类型</text>
<text x="78" y="96" fill="#6b7280" font-family="sans-serif" font-size="11">名称</text>
<rect x="22" y="102" width="48" height="30" rx="6" fill="#fff" stroke="#d1d5db"/><text x="34" y="122" fill="#1f2937" font-family="sans-serif" font-size="12">A ▾</text>
<rect x="78" y="102" width="418" height="30" rx="6" fill="#fff" stroke="#d1d5db"/><text x="88" y="122" fill="#1f2937" font-family="sans-serif" font-size="12">dot</text>
<text x="22" y="156" fill="#6b7280" font-family="sans-serif" font-size="11">IPv4 地址</text>
<text x="300" y="156" fill="#6b7280" font-family="sans-serif" font-size="11">代理状态</text>
<text x="430" y="156" fill="#6b7280" font-family="sans-serif" font-size="11">TTL</text>
<rect x="22" y="162" width="262" height="30" rx="6" fill="#fff" stroke="#d1d5db"/><text x="32" y="182" fill="#1f2937" font-family="sans-serif" font-size="12">203.0.113.10</text>
<rect x="300" y="164" width="34" height="20" rx="10" fill="#e5e7eb"/><circle cx="310" cy="174" r="8" fill="#fff" stroke="#d1d5db"/>
<text x="340" y="178" fill="#6b7280" font-family="sans-serif" font-size="11">仅 DNS</text>
<rect x="430" y="162" width="66" height="30" rx="6" fill="#fff" stroke="#d1d5db"/><text x="440" y="182" fill="#1f2937" font-family="sans-serif" font-size="12">自动 ▾</text>
<rect x="22" y="222" width="64" height="32" rx="6" fill="#f48120"/><text x="54" y="243" fill="#fff" font-family="sans-serif" font-size="12.5" text-anchor="middle">保存</text>
<rect x="94" y="222" width="64" height="32" rx="6" fill="#fff" stroke="#d1d5db"/><text x="126" y="243" fill="#374151" font-family="sans-serif" font-size="12.5" text-anchor="middle">取消</text>
</svg>
