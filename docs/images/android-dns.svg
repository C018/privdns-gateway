<svg viewBox="0 0 220 372" width="300" height="507" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="安卓私人 DNS 设置示意">
<title>安卓私人 DNS</title>
<rect x="0" y="0" width="220" height="372" rx="14" fill="#ffffff"/>
<rect x="0" y="0" width="220" height="44" rx="14" fill="#ffffff"/>
<text x="16" y="28" fill="#202124" font-family="sans-serif" font-size="14" font-weight="500">私人 DNS</text>
<line x1="0" y1="44" x2="220" y2="44" stroke="#e3e3e3"/>
<circle cx="26" cy="74" r="7" fill="none" stroke="#9aa0a6" stroke-width="2"/>
<text x="42" y="78" fill="#3c4043" font-family="sans-serif" font-size="12">自动</text>
<circle cx="26" cy="108" r="7" fill="none" stroke="#9aa0a6" stroke-width="2"/>
