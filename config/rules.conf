# PrivDNS Gateway — 上层规则 (Surge 风格)
# 安装路径: /etc/pdg/rules.conf
#
# 这是【唯一】的规则源。`pdg compile` 由它同时生成:
#   - dnsdist 规则 (决定某域名 DNS 是否返回 JP 唯一内网 IP)
#   - sing-box route 规则 (决定 JP 上该域名的流量走哪个出口)
# 不要手动维护两套，否则 DNS 与 sing-box 会不一致。
#
# 支持的规则类型 (V1):
#   DOMAIN,host,POLICY            精确域名
#   DOMAIN-SUFFIX,suffix,POLICY   域名后缀 (含子域)
#   DOMAIN-KEYWORD,kw,POLICY      域名关键字
#   DOMAIN-REGEX,regex,POLICY     正则
#   RULE-SET,url,POLICY           远程 Surge .list 规则集
#   FINAL,POLICY                  兜底策略
#
# POLICY 必须在 policies.conf 中映射到某个出口。
# 行内 `#` 之后为注释。规则按【从上到下】顺序匹配，首个命中生效。

# ---- AI ----
DOMAIN-SUFFIX,openai.com,AI
DOMAIN-SUFFIX,chatgpt.com,AI
DOMAIN-SUFFIX,oaiusercontent.com,AI
DOMAIN-SUFFIX,anthropic.com,AI
DOMAIN-SUFFIX,claude.ai,AI

# ---- Binance ----
DOMAIN-SUFFIX,binance.com,Binance
DOMAIN-SUFFIX,binance.info,Binance

# ---- Google / Play (墙内必须代理; gvt1/gvt2 是 Play 安装包下载源, 漏了会卡 pending) ----
DOMAIN-SUFFIX,google.com,Google
DOMAIN-SUFFIX,googleapis.com,Google
DOMAIN-SUFFIX,gstatic.com,Google
DOMAIN-SUFFIX,googleusercontent.com,Google
DOMAIN-SUFFIX,ggpht.com,Google
DOMAIN-SUFFIX,gvt1.com,Google
DOMAIN-SUFFIX,gvt2.com,Google
DOMAIN-SUFFIX,gvt3.com,Google
DOMAIN-SUFFIX,dl.google.com,Google
DOMAIN-SUFFIX,play.google.com,Google
DOMAIN-SUFFIX,android.com,Google

# ---- YouTube ----
DOMAIN-SUFFIX,youtube.com,YouTube
DOMAIN-SUFFIX,googlevideo.com,YouTube
DOMAIN-SUFFIX,ytimg.com,YouTube
# YouTube/Google 媒体 CDN 的 IDN 变体 (rr#---sn-xxx.<这个>); 实测会用到, 漏了会走默认出口
DOMAIN-SUFFIX,xn--ngstr-lra8j.com,YouTube

# ---- Netflix ----
DOMAIN-SUFFIX,netflix.com,Netflix
DOMAIN-SUFFIX,nflxvideo.net,Netflix

# ---- GlobalMedia (X / Instagram) ----
DOMAIN-SUFFIX,x.com,GlobalMedia
DOMAIN-SUFFIX,twitter.com,GlobalMedia
DOMAIN-SUFFIX,instagram.com,GlobalMedia
DOMAIN-SUFFIX,cdninstagram.com,GlobalMedia

# ---- Telegram (注: TG App 主力走硬编码 DC IP, 本网关只能代理 t.me/网页/部分 API) ----
DOMAIN-SUFFIX,t.me,Telegram
DOMAIN-SUFFIX,telegram.org,Telegram
DOMAIN-SUFFIX,telegra.ph,Telegram
DOMAIN-SUFFIX,telesco.pe,Telegram

# ---- 国内直连 (DNS 返回真实 IP, 手机直接访问, 不进 JP) ----
# 全代理模式下, 国内站必须显式直连, 否则会被默认规则代理到 JP (变慢)。
DOMAIN-SUFFIX,bilibili.com,BiliBili
DOMAIN-SUFFIX,apple.com,Apple
DOMAIN-SUFFIX,qq.com,China
DOMAIN-SUFFIX,taobao.com,China
DOMAIN-SUFFIX,tmall.com,China
DOMAIN-SUFFIX,jd.com,China
DOMAIN-SUFFIX,weibo.com,China
DOMAIN-SUFFIX,baidu.com,China
DOMAIN-SUFFIX,alipay.com,China
DOMAIN-SUFFIX,wechat.com,China
DOMAIN-SUFFIX,douyin.com,China
DOMAIN-SUFFIX,163.com,China
DOMAIN-SUFFIX,bytedance.com,China

# ---- 远程 RULE-SET (Surge .list) ----
# 第一版默认注释掉, 验证完本地规则闭环后再逐步开启 (启用前先 `pdg update-rules` 拉缓存)。
# 全代理模式下, 强烈建议启用一份较全的【国内直连】清单, 否则大量国内站会被代理变慢:
# RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/cn.txt,China
# RULE-SET,https://raw.githubusercontent.com/Rabbit-Spec/Surge/Master/Rules/YouTube.list,YouTube
# RULE-SET,https://raw.githubusercontent.com/Rabbit-Spec/Surge/Master/Rules/Netflix.list,Netflix
# RULE-SET,https://raw.githubusercontent.com/Rabbit-Spec/Surge/Master/Rules/Disney.list,Disney+
